
- id: 'hardware_safety_freeze_protection'
  alias: "Safety Override: Prevent Extreme Overcooling"
  description: "Hard failsafe. If the DQN agent fails and indoor temp drops below 17°C, force HVAC off."
  trigger:
    - platform: numeric_state
      entity_id: sensor.indoor_temperature 
      below: 17.0
  condition: []
  action:
    - service: climate.turn_off
      target:
        entity_id: climate.living_room_ac 
    - service: system_log.write
      data:
        message: "[CRITICAL SAFETY] DQN Agent overcooled the house. HVAC forcefully disabled."
        level: error
  mode: single

- id: 'human_in_the_loop_override'
  alias: "Human Override: Pause Agent"
  description: "If a user manually adjusts the physical thermostat, pause the RL agent's API commands."
  trigger:
    - platform: state
      entity_id: climate.living_room_ac
  condition:
    - condition: template
      value_template: "{{ trigger.to_state.context.user_id != none }}"
  action:
    - service: mqtt.publish
      data:
        topic: smart_home/system/override
        payload: "MANUAL_INTERVENTION_DETECTED"
  mode: single